name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

  desktop-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Desktop Smoke Build (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_FOR_PULL_REQUEST: 'false'
        run: npm run desktop:ci:smoke

      - name: Verify updater artifacts
        run: npm run desktop:ci:verify-artifacts

      - name: Upload release artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-release
          path: |
            release/latest-mac.yml
            release/*.zip
            release/*.zip.blockmap
          if-no-files-found: error
