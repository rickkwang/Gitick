name: Desktop Release Gate

on:
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build desktop packages
        run: npm run desktop:dmg

      - name: Verify mac signatures (release gate)
        run: node scripts/verify-mac-signatures.mjs

      - name: Verify updater artifacts
        run: npm run desktop:ci:verify-artifacts
